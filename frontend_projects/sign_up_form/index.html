<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <main class="flex justify-content-center align-items-center form-box">
        <form action="javascript:void(0)" method="post" class="flex flex-column sign-up-form">
            <div class="form-head flex flex-column">
                <h1>Create An Account</h1>
                <p>Create an account to enjoy all the services<br>
                    without any ads for free!</p>
            </div>
            <div class="inputs flex flex-column">
                <input type="email" placeholder="Email Address" class="input" autocomplete="off">
                <input type="password" placeholder="Password" class="input" minlength="6">
            </div>
            <div class="bottom-form">
                <button type="button" class="button">Create Account</button>
                <p>Already Have An Account? <a href="#">Sign in</a></p>
            </div>
        </form>
    </main>
</body>
</html>
